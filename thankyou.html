=============================================================
  SATYAM EDUTECH — FREE DEMO BOOKING LANDING PAGE
  Production-ready | Single HTML file | Vercel-deployable
=============================================================

GOOGLE SHEETS INTEGRATION SETUP:
─────────────────────────────────
STEP 1: Create a Google Sheet with these column headers in Row 1:
  A1: Timestamp  |  B1: Student Name  |  C1: Phone Number  |  D1: Class

STEP 2: In the Sheet, go to Extensions > Apps Script and paste:

  function doPost(e) {
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    var data = JSON.parse(e.postData.contents);
    sheet.appendRow([
      new Date(),
      data.name,
      data.phone,
      data.class
    ]);
    return ContentService
      .createTextOutput(JSON.stringify({status: "success"}))
      .setMimeType(ContentService.MimeType.JSON);
  }

STEP 3: Click Deploy > New Deployment > Web App
  - Execute as: Me
  - Who has access: Anyone
  - Click Deploy, authorize, copy the Web App URL

STEP 4: Replace YOUR_GOOGLE_SCRIPT_URL below (search for it in the JS section)
=============================================================
-->
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Satyam Edutech | Demo Booked</title>
  <meta name="description"
    content="Join Durgapur's most trusted commerce coaching institute. 30+ years, only 6 students per batch, 1-on-1 mentorship with Seth Sir. Book your FREE demo class today." />
  <meta property="og:title" content="Satyam Edutech — Best Commerce Coaching in Durgapur" />
  <meta property="og:description"
    content="30+ years of excellence. Only 6 seats per batch. Book your FREE demo class now." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #FF6600;
      --orange-light: #FFF0E6;
      --orange-dark: #e55a00;
      --bg: #ffffff;
      --bg-alt: #F9F9F9;
      --text: #1A1A1A;
      --text-muted: #666666;
      --border: #E5E5E5;
      --green: #25D366;
      --radius: 14px;
      --font: 'Plus Jakarta Sans', sans-serif;
      --shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.10);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ─── UTILITIES ─── */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .badge {
      display: inline-block;
      background: var(--orange-light);
      color: var(--orange);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .section-label {
      text-align: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      text-align: center;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-muted);
      text-align: center;
      max-width: 600px;
      margin: 0 auto 48px;
    }

    .orange {
      color: var(--orange);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orange);
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      padding: 15px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(255, 102, 0, 0.35);
    }

    .btn-primary:hover {
      background: var(--orange-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(255, 102, 0, 0.45);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 10px;
      border: 2px solid var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-outline:hover {
      background: var(--text);
      color: #fff;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: none;
    }

    /* ─── STICKY HEADER ─── */
    #header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--text);
      font-weight: 500;
    }

    .header-cta {
      font-size: 15px;
      padding: 10px 22px;
    }

    /* ─── HERO ─── */
    #hero {
      background: var(--bg);
      padding: 60px 0 56px;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 48px;
      align-items: center;
    }

    .hero-badge {
      margin-bottom: 18px;
    }

    .hero h1 {
      font-size: clamp(28px, 4.5vw, 50px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .hero-sub {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 32px;
      max-width: 520px;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .trust-strip {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .trust-item::before {
      content: '✓';
      color: var(--orange);
      font-weight: 800;
    }

    /* Hero image */
    .hero-image {
      width: 100%;
      height: auto;
      max-height: 520px;
      object-fit: cover;
      object-position: center;
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      border: 4px solid #fff;
    }

    /* <!-- REPLACE: Replace .hero-image-block with an <img> tag pointing to Seth Sir's classroom photo --> */

    /* ─── PROBLEM SECTION ─── */
    #problem {
      padding: 72px 0;
      background: var(--bg-alt);
    }

    .pain-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .pain-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .pain-card .icon {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .pain-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .pain-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .transition-line {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .transition-line span {
      color: var(--orange);
    }

    /* ─── WHY SECTION ─── */
    #why {
      padding: 80px 0;
      background: var(--bg);
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 22px;
    }

    .feature-card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .feature-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
    }

    .feature-card .f-icon {
      width: 48px;
      height: 48px;
      background: var(--orange-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
    }

    .feature-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .feature-card p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ─── TESTIMONIALS ─── */
    #testimonials {
      padding: 80px 0;
      background: var(--bg-alt);
    }

    .testi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .testi-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .testi-card::before {
      content: '"';
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 60px;
      color: var(--orange-light);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .testi-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--orange-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--orange);
      margin-bottom: 14px;
      overflow: hidden;
      border: 2px solid var(--orange-light);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
    }

    .testi-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      border-radius: 50%;
    }

    .testi-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .testi-tag {
      display: inline-block;
      background: var(--orange-light);
      color: var(--orange);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 12px;
    }

    .testi-quote {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ─── HOW IT WORKS ─── */
    #how {
      padding: 80px 0;
      background: var(--bg);
    }

    .steps-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      position: relative;
      margin-bottom: 32px;
    }

    .steps-row::before {
      content: '';
      position: absolute;
      top: 36px;
      left: calc(16.66% + 24px);
      right: calc(16.66% + 24px);
      height: 2px;
      background: linear-gradient(90deg, var(--orange), var(--orange-light));
      border-radius: 2px;
    }

    .step {
      text-align: center;
      padding: 0 12px;
    }

    .step-num {
      width: 72px;
      height: 72px;
      background: var(--orange);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      margin: 0 auto 18px;
      box-shadow: 0 4px 18px rgba(255, 102, 0, 0.35);
      position: relative;
      z-index: 1;
    }

    .step h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .step p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .fee-note {
      background: var(--orange-light);
      border-radius: var(--radius);
      padding: 18px 24px;
      text-align: center;
      font-size: 15px;
      color: var(--text);
      max-width: 680px;
      margin: 0 auto;
    }

    /* ─── STATS ─── */
    #stats {
      padding: 56px 0;
      background: var(--orange);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }

    .stat-label {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.85);
      margin-top: 6px;
      font-weight: 500;
    }

    /* ─── FORM SECTION ─── */
    #form-section {
      padding: 80px 0;
      background: var(--bg-alt);
    }

    .form-wrap {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      padding: 44px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    .form-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
      text-align: center;
    }

    .form-sub {
      font-size: 15px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.12);
    }

    .form-group input.error,
    .form-group select.error {
      border-color: #e53e3e;
    }

    .form-error {
      font-size: 12px;
      color: #e53e3e;
      margin-top: 5px;
      display: none;
    }

    .phone-wrap {
      position: relative;
    }

    .phone-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      pointer-events: none;
    }

    .phone-wrap input {
      padding-left: 46px;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      border-radius: 12px;
      margin-top: 8px;
    }

    .form-trust {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }

    .form-trust span {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .call-link {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: var(--text-muted);
    }

    .call-link a {
      color: var(--orange);
      font-weight: 700;
    }

    /* Form states */
    #form-loading,
    #form-success,
    #form-error-msg {
      display: none;
      text-align: center;
      padding: 24px 0;
    }

    #form-success h3 {
      font-size: 22px;
      font-weight: 800;
      color: #1A1A1A;
      margin-bottom: 8px;
    }

    #form-success p {
      color: var(--text-muted);
      font-size: 15px;
    }

    #form-error-msg p {
      color: #e53e3e;
      font-size: 15px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--orange-light);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ─── FAQ ─── */
    #faq {
      padding: 80px 0;
      background: var(--bg);
    }

    .faq-list {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .faq-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .faq-q {
      width: 100%;
      background: none;
      border: none;
      padding: 22px 24px;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      transition: background 0.2s;
    }

    .faq-q:hover {
      background: var(--bg-alt);
    }

    .faq-q .faq-icon {
      font-size: 20px;
      color: var(--orange);
      flex-shrink: 0;
      transition: transform 0.25s;
    }

    .faq-a {
      padding: 0 24px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }

    .faq-a p {
      font-size: 15px;
      color: var(--text-muted);
      padding-bottom: 20px;
    }

    .faq-item.open .faq-a {
      max-height: 200px;
    }

    .faq-item.open .faq-q {
      background: var(--bg-alt);
    }

    .faq-item.open .faq-icon {
      transform: rotate(45deg);
    }

    /* ─── FINAL CTA ─── */
    #final-cta {
      padding: 80px 0;
      background: var(--text);
      text-align: center;
    }

    #final-cta h2 {
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    #final-cta p {
      font-size: 17px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 36px;
    }

    /* ─── FOOTER ─── */
    footer {
      background: #111;
      padding: 36px 0;
    }

    .footer-inner {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .footer-logo {
      font-size: 20px;
      font-weight: 800;
      color: var(--orange);
    }

    .footer-info {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      text-align: right;
    }

    .footer-info a {
      color: rgba(255, 255, 255, 0.7);
    }

    /* ─── WHATSAPP FLOAT ─── */
    #wa-btn {
      position: fixed;
      bottom: 28px;
      right: 24px;
      width: 60px;
      height: 60px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
      z-index: 999;
      animation: pulse-green 2.5s infinite;
      text-decoration: none;
    }

    #wa-btn svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
      }

      50% {
        box-shadow: 0 4px 32px rgba(37, 211, 102, 0.75), 0 0 0 8px rgba(37, 211, 102, 0.12);
      }
    }

    /* ─── MOBILE STICKY BAR ─── */
    #mobile-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      z-index: 800;
    }

    #mobile-bar .btn-primary {
      width: 100%;
      justify-content: center;
      font-size: 17px;
      padding: 15px;
      border-radius: 12px;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
      }

      .hero-image-block {
        min-height: 260px;
      }

      .steps-row {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .steps-row::before {
        display: none;
      }
    }

    @media (max-width: 768px) {
      #mobile-bar {
        display: block;
      }

      #wa-btn {
        bottom: 84px;
      }

      .stats-row {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .form-wrap {
        padding: 28px 20px;
      }

      .trust-strip {
        gap: 14px;
      }

      .section-sub {
        margin-bottom: 32px;
      }
    }

    @media (max-width: 480px) {
      .hero-btns {
        flex-direction: column;
      }

      .logo {
        font-size: 19px;
      }

      .header-cta {
        font-size: 13px !important;
        padding: 8px 14px !important;
        min-height: auto !important;
        width: auto !important;
      }

      #mobile-bar .btn-primary {
        font-size: 14px;
        padding: 12px 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn-primary,
      .btn-outline {
        width: 100%;
        justify-content: center;
        min-height: 52px;

  <script>
    // ── GOOGLE SHEETS ENDPOINT ──
    // REPLACE 'YOUR_GOOGLE_SCRIPT_URL' with your deployed Apps Script Web App URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgKDsvMu_O8ICfAG4X0R4tRBXaTvpfIVd_YoHV4-c6dcHtyF0tpeyPnm1Up4wZ0ZKECQ/exec';

    // ── SCROLL ANIMATIONS ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // ── MOBILE STICKY BAR: show after hero ──
        // ── FAQ ACCORDION ──
    document.querySelectorAll('.faq-q').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.faq-item');
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
        if (!isOpen) item.classList.add('open');
        btn.setAttribute('aria-expanded', !isOpen);
      });
    });

    // ── FORM VALIDATION & SUBMISSION ──
    const form = document.getElementById('demo-form');
    const submitBtn = document.getElementById('submit-btn');

    function showState(state) {
      document.getElementById('form-default').style.display = state === 'default' ? 'block' : 'none';
      document.getElementById('form-loading').style.display = state === 'loading' ? 'block' : 'none';
      document.getElementById('form-success').style.display = state === 'success' ? 'block' : 'none';
      document.getElementById('form-error-msg').style.display = state === 'error' ? 'block' : 'none';
    }

    function resetForm() {
      form.reset();
      showState('default');
      submitBtn.disabled = false;
    }

    function setFieldError(fieldId, errorId, show) {
      const field = document.getElementById(fieldId);
      const errEl = document.getElementById(errorId);
      if (show) {
        field.classList.add('error');
        errEl.style.display = 'block';
      } else {
        field.classList.remove('error');
        errEl.style.display = 'none';
      }
    }

    function validate() {
      let valid = true;
      const name = document.getElementById('student-name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const cls = document.getElementById('class-select').value;

      const nameInvalid = name.length < 2;
      const phoneInvalid = !/^\d{10}$/.test(phone);
      const classInvalid = !cls;

      setFieldError('student-name', 'name-error', nameInvalid);
      setFieldError('phone', 'phone-error', phoneInvalid);
      setFieldError('class-select', 'class-error', classInvalid);

      if (nameInvalid || phoneInvalid || classInvalid) valid = false;
      return valid;
    }

    // Clear errors on input
    ['student-name', 'phone', 'class-select'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        el.classList.remove('error');
        const errId = id === 'student-name' ? 'name-error' : id === 'phone' ? 'phone-error' : 'class-error';
        document.getElementById(errId).style.display = 'none';
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      submitBtn.disabled = true;
      showState('loading');

      const payload = {
        name: document.getElementById('student-name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        class: document.getElementById('class-select').value
      };

      // If no URL configured yet, show success anyway (dev mode)
      if (SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_URL') {
        setTimeout(() => showState('success'), 1200);
        return;
      }

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        // no-cors means we can't read the response; assume success
        showState('success');
      } catch (err) {
        console.error(err);
        showState('error');
        submitBtn.disabled = false;
      }
    });

    // Format phone number on input to handle pasted numbers with country code
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('input', function() {
      // Remove all non-digit characters
      let val = this.value.replace(/\D/g, '');
      
      // If user pasted number with country code (e.g., 919876543210)
      if (val.startsWith('91') && val.length > 10) {
        val = val.substring(2);
      }
      
      // Enforce 10 digit limit and update value
      this.value = val.substring(0, 10);
    });

    // Only allow digits in phone field
    phoneInput.addEventListener('keypress', (e) => {
      if (!/[0-9]/.test(e.key)) e.preventDefault();
    });
  </script>
